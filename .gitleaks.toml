[extend]
useDefault = true

# Suppress false positives in vendored third-party scripts that are not
# modifiable (git submodule). Empty string defaults are not real credentials.
[[allowlist]]
description = "Empty password defaults in vendored script-helpers (not real credentials)"
paths = [
  '''vendor/script-helpers/scripts/ci_pimcore_bundle_check\.sh'''
]
regexes = [
  '''db_password\s*=\s*""'''
]
regexTarget = "line"
