name: go-release
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      working_directory:
        type: string
        default: "."
      fetch_depth:
        type: number
        default: 0
      go_version:
        type: string
        default: "1.22"
      bin_name:
        type: string
        required: true
      main_path:
        type: string
        default: "."
      artifact_dir:
        type: string
        default: "artifacts"
      build_targets:
        type: string
        default: "linux/amd64,windows/amd64,darwin/amd64"
      ldflags:
        type: string
        default: ""
      release_tag:
        type: string
        default: ""
      binary_links:
        type: string
        default: ""
      binary_base_url:
        type: string
        default: ""
      release_name:
        type: string
        default: ""
      release_notes:
        type: string
        default: ""
      generate_release_notes:
        type: boolean
        default: true

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Build release binaries
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        env:
          INPUT_ARTIFACT_DIR: ${{ inputs.artifact_dir }}
          INPUT_LDFLAGS: ${{ inputs.ldflags }}
          INPUT_BUILD_TARGETS: ${{ inputs.build_targets }}
          INPUT_BIN_NAME: ${{ inputs.bin_name }}
          INPUT_MAIN_PATH: ${{ inputs.main_path }}
        run: |
          set -euo pipefail
          if [[ "${INPUT_MAIN_PATH}" == -* ]]; then
            echo "Invalid main_path: values starting with '-' are not allowed." >&2
            exit 2
          fi

          mkdir -p -- "${INPUT_ARTIFACT_DIR}"
          IFS=',' read -r -a targets <<< "${INPUT_BUILD_TARGETS}"

          for target in "${targets[@]}"; do
            goos="${target%%/*}"
            goarch="${target##*/}"
            if [ -z "$goos" ] || [ -z "$goarch" ] || [ "$goos" = "$goarch" ]; then
              echo "Invalid target: $target (expected os/arch)" >&2
              exit 2
            fi

            suffix="${goos}-${goarch}"
            ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            out="${INPUT_ARTIFACT_DIR}/${INPUT_BIN_NAME}-${suffix}${ext}"
            if [ -n "${INPUT_LDFLAGS}" ]; then
              env CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
                go build -o "$out" -ldflags "${INPUT_LDFLAGS}" "${INPUT_MAIN_PATH}"
            else
              env CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
                go build -o "$out" "${INPUT_MAIN_PATH}"
            fi
          done

          ls -al -- "${INPUT_ARTIFACT_DIR}"

      - name: Collect binary links
        id: binaries
        shell: bash
        env:
          INPUT_BINARY_LINKS: ${{ inputs.binary_links }}
          INPUT_BIN_NAME: ${{ inputs.bin_name }}
          INPUT_BUILD_TARGETS: ${{ inputs.build_targets }}
        run: |
          set -euo pipefail
          write_multiline_output() {
            local key="$1"
            local value="$2"
            local delimiter="GH_OUTPUT_${RANDOM}_${RANDOM}_$(date +%s)"
            while [[ "$value" == *"$delimiter"* ]]; do
              delimiter="GH_OUTPUT_${RANDOM}_${RANDOM}_$(date +%s)"
            done
            {
              printf '%s<<%s\n' "$key" "$delimiter"
              printf '%s\n' "$value"
              printf '%s\n' "$delimiter"
            } >> "$GITHUB_OUTPUT"
          }

          if [ -n "${INPUT_BINARY_LINKS}" ]; then
            write_multiline_output "links" "${INPUT_BINARY_LINKS}"
            exit 0
          fi

          links=()
          bin="${INPUT_BIN_NAME}"
          IFS=',' read -r -a targets <<< "${INPUT_BUILD_TARGETS}"
          for target in "${targets[@]}"; do
            goos="${target%%/*}"
            goarch="${target##*/}"
            suffix="${goos}-${goarch}"
            filename="${bin}-${suffix}"
            if [ "$goos" = "windows" ]; then
              filename="${filename}.exe"
            fi
            label="${goos} ${goarch}"
            links+=("${label}|${filename}")
          done

          write_multiline_output "links" "$(printf "%s\n" "${links[@]}")"

      - name: Generate release notes
        id: notes
        if: ${{ inputs.generate_release_notes }}
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_BINARY_BASE_URL: ${{ inputs.binary_base_url }}
        run: |
          set -euo pipefail
          write_multiline_output() {
            local key="$1"
            local value="$2"
            local delimiter="GH_OUTPUT_${RANDOM}_${RANDOM}_$(date +%s)"
            while [[ "$value" == *"$delimiter"* ]]; do
              delimiter="GH_OUTPUT_${RANDOM}_${RANDOM}_$(date +%s)"
            done
            {
              printf '%s<<%s\n' "$key" "$delimiter"
              printf '%s\n' "$value"
              printf '%s\n' "$delimiter"
            } >> "$GITHUB_OUTPUT"
          }

          repo_dir="${GITHUB_WORKSPACE:-.}"
          cd "$repo_dir"

          since_tag=""
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            since_tag="$(git describe --tags --abbrev=0)"
          fi

          notes_file="$(mktemp)"
          if [ -n "$since_tag" ]; then
            git log --pretty=format:"* %s" "${since_tag}..HEAD" > "$notes_file"
          else
            git log --pretty=format:"* %s" > "$notes_file"
          fi

          if [ ! -s "$notes_file" ]; then
            echo "* No changes listed." > "$notes_file"
          fi

          release_tag="${INPUT_RELEASE_TAG}"
          if [ -z "$release_tag" ]; then
            release_tag="${GITHUB_REF_NAME:-}"
          fi

          binary_base_url="${INPUT_BINARY_BASE_URL}"
          if [ -z "$binary_base_url" ] && [ -n "$release_tag" ]; then
            binary_base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}"
          fi

          binary_links="${{ steps.binaries.outputs.links }}"
          if [ -n "$binary_links" ] && [ -n "$binary_base_url" ]; then
            {
              echo ""
              echo "## Download Binaries"
              echo ""
              echo "| Platform | Binary |"
              echo "|----------|--------|"
            } >> "$notes_file"

            while IFS= read -r line; do
              trimmed="${line#"${line%%[![:space:]]*}"}"
              if [ -z "$trimmed" ]; then
                continue
              fi
              label="${trimmed%%|*}"
              filename="${trimmed#*|}"
              if [ -z "$label" ] || [ -z "$filename" ] || [ "$label" = "$filename" ]; then
                continue
              fi
              printf "| %s | [%s](%s/%s) |\n" "$label" "$filename" "$binary_base_url" "$filename" >> "$notes_file"
            done <<< "$binary_links"
          fi

          notes_content="$(cat "$notes_file")"
          write_multiline_output "notes" "$notes_content"

      - name: Create GitHub release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1 @ 2026-04-13
        with:
          tag_name: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref }}
          release_name: ${{ inputs.release_name != '' && inputs.release_name || format('Release {0}', github.ref_name) }}
          body: ${{ inputs.release_notes != '' && inputs.release_notes || steps.notes.outputs.notes }}
          files: ${{ inputs.working_directory }}/${{ inputs.artifact_dir }}/*
          update_existing: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
