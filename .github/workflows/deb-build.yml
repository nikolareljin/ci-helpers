name: ci-helpers-deb-build
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      working_directory:
        type: string
        default: "."
      fetch_depth:
        type: number
        default: 0
      prebuild_command:
        type: string
        default: "make man"
      build_command:
        type: string
        default: ""
      extra_packages:
        type: string
        default: ""
      artifact_name:
        type: string
        default: "deb-packages"
      artifact_glob:
        type: string
        default: "../*.deb"
      upload_to_release:
        description: >
          Upload the built .deb to the GitHub release. Set to "true" to always
          upload, "false" to never upload, or "auto" (default) to upload only
          when the workflow was triggered by a tag push or a release_tag input
          is provided.
        type: string
        default: "auto"
      release_tag:
        description: >
          Tag to attach the .deb to. Defaults to the pushed tag (GITHUB_REF_NAME).
          Set explicitly when triggering via workflow_dispatch with a backfill tag.
        type: string
        default: ""

permissions:
  contents: write

# Opt into Node.js 24 early — Node 20 actions deprecated (removed Sep 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          fetch-tags: true

      - name: Install packaging prerequisites
        shell: bash
        env:
          EXTRA_PACKAGES: ${{ inputs.extra_packages }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            devscripts \
            dh-python \
            python3
          if [ -n "${EXTRA_PACKAGES:-}" ]; then
            sudo apt-get install -y $EXTRA_PACKAGES
          fi

      - name: Bootstrap script-helpers
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          git submodule update --init --recursive || true
          if [[ -d "scripts/script-helpers" && ! -e "vendor/script-helpers" ]]; then
            mkdir -p vendor
            ln -sfn ../scripts/script-helpers vendor/script-helpers
          fi
          if [[ ! -e "vendor/script-helpers" ]]; then
            echo "vendor/script-helpers not found; ensure script-helpers is vendored or initialized." >&2
            exit 1
          fi

      - name: Build package
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        env:
          PREBUILD_CMD: ${{ inputs.prebuild_command }}
          BUILD_CMD: ${{ inputs.build_command }}
        run: |
          set -euo pipefail
          ./vendor/script-helpers/scripts/build_deb_artifacts.sh \
            --repo . \
            --prebuild "$PREBUILD_CMD" \
            --build "$BUILD_CMD"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_glob }}

      - name: Resolve release tag
        id: resolve
        if: inputs.upload_to_release != 'false'
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
          UPLOAD_MODE: ${{ inputs.upload_to_release }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          # Strip newlines to prevent GITHUB_OUTPUT injection via unvalidated input
          tag="${tag//$'\n'/}"
          # "auto": only upload when the ref is a real tag push or release_tag was given
          if [[ "$UPLOAD_MODE" == "auto" ]]; then
            if [[ -z "$INPUT_TAG" ]]; then
              # No explicit release_tag: require both a refs/tags/* ref AND semver name
              if [[ "${GITHUB_REF}" != refs/tags/* ]] || ! echo "$tag" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            # Explicit release_tag: user intent is clear; skip ref-type check
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"   >> "$GITHUB_OUTPUT"

      - name: Upload .deb to GitHub release
        if: inputs.upload_to_release != 'false' && steps.resolve.outputs.skip == 'false'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          files: ${{ inputs.artifact_glob }}
          update_existing: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
