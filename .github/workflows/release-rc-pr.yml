name: Release RC PR

on:
  create:
  workflow_call:
    inputs:
      base_branch:
        description: >
          Branch the PR targets. Defaults to main — override with master or
          any other branch name when your repo's default differs.
          For the on:create trigger (ci-helpers internal), the actual default
          branch is always read from the repository object in the event payload.
        type: string
        default: "main"
    secrets:
      GH_PAT:
        description: >
          PAT with pull-request write access. Required if the repo has
          "Allow GitHub Actions to create and approve pull requests" disabled.
          Use a classic PAT with repo scope, or a fine-grained PAT with
          Pull requests: Read and write permission.
          Falls back to github.token when not set.
        required: false

permissions:
  contents: read
  pull-requests: write

# Opt into Node.js 24 early — Node 20 actions deprecated (removed Sep 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  open_pr:
    # on:create  — only act on release/* branches
    # workflow_call — caller already filtered; always proceed
    if: ${{ github.event_name == 'workflow_call' || (github.event.ref_type == 'branch' && startsWith(github.event.ref, 'release/')) }}
    runs-on: ubuntu-latest
    env:
      HEAD_BRANCH: ${{ github.ref_name }}
      # workflow_call: inputs.base_branch carries the caller-supplied value (default "main").
      # on:create: the inputs context is undefined; use the explicit guard so the
      #   empty-string fallback is intentional rather than accidental.
      #   The script then falls back to context.payload.repository.default_branch.
      BASE_BRANCH: ${{ github.event_name == 'workflow_call' && inputs.base_branch || '' }}
    steps:
      - name: Create PR to default branch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9 @ 2026-05-23
        with:
          # Prefer GH_PAT when set — it bypasses the repo-level
          # "Allow GitHub Actions to create and approve pull requests" gate.
          # Falls back to github.token, which works when that gate is enabled
          # under Settings → Actions → General.
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // github.ref_name is always the branch/tag name for the triggering
            // event, whether that's on:create or an inherited workflow_call context.
            const head = process.env.HEAD_BRANCH;

            const pattern = /^release\/v?\d+\.\d+\.\d+(-rc\.?\d+)?$/;
            if (!pattern.test(head)) {
              core.info(`Branch ${head} does not match release/[v]X.Y.Z[-rcN|-rc.N]; skipping.`);
              return;
            }

            // workflow_call: base_branch input (default "main") is in BASE_BRANCH.
            // on:create:     BASE_BRANCH is empty; fall back to the event payload,
            //                then hard-code "main" as last resort.
            const base = process.env.BASE_BRANCH ||
                         context.payload.repository?.default_branch ||
                         'main';

            const existing = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:${head}`, base,
            });

            if (existing.data.length > 0) {
              core.info(`PR already exists for ${head} -> ${base}`);
              return;
            }

            const title = `Release: ${head}`;
            const body  = `Auto-created PR for release branch \`${head}\` into \`${base}\`.`;

            try {
              await github.rest.pulls.create({ owner, repo, head, base, title, body });
              core.info(`Created PR ${head} -> ${base}`);
            } catch (err) {
              if (err.status === 403) {
                core.warning(
                  `Could not create PR for ${head} -> ${base} (403 Forbidden).\n` +
                  `Possible causes and remediations:\n` +
                  `  1. Repo setting disabled: enable "Allow GitHub Actions to create and approve pull requests"\n` +
                  `     under Settings → Actions → General.\n` +
                  `  2. Caller token lacks pull-requests: write: ensure the calling workflow grants\n` +
                  `     permissions: pull-requests: write (for workflow_call).\n` +
                  `  3. No PAT configured: set the GH_PAT secret to a classic PAT with the repo scope,\n` +
                  `     or a fine-grained PAT with "Pull requests: Read and write" permission.\n` +
                  `Create the PR manually: ${head} -> ${base}`
                );
                return;
              }
              throw err;
            }
