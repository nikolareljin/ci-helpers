name: preset-pnpm
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      working_directory:
        type: string
        default: "."
      fetch_depth:
        type: number
        default: 0
      node_version:
        type: string
        default: "22"
      pnpm_version:
        type: string
        default: "latest"
      lint_command:
        type: string
        default: "pnpm run lint"
      test_command:
        type: string
        default: "pnpm run test"
      build_command:
        type: string
        default: "pnpm run build"
      e2e_command:
        type: string
        default: ""
      extra_command:
        type: string
        default: ""
      upload_test_results:
        type: boolean
        default: false
      test_results_path:
        type: string
        default: "test-results/**/*.xml"

# Opt into Node.js 24 early — Node 20 actions deprecated (removed Sep 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Lint
        if: ${{ inputs.lint_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.lint_command }}

      - name: Test
        if: ${{ inputs.test_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.test_command }}

      - name: Build
        if: ${{ inputs.build_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.build_command }}

      - name: E2E
        if: ${{ inputs.e2e_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.e2e_command }}

      - name: Extra
        if: ${{ inputs.extra_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.extra_command }}

      - name: Upload test results
        if: ${{ inputs.upload_test_results && (success() || failure()) }}
        uses: dorny/test-reporter@v2
        with:
          name: Tests
          path: ${{ inputs.working_directory != '.' && format('{0}/{1}', inputs.working_directory, inputs.test_results_path) || inputs.test_results_path }}
          reporter: java-junit
          fail-on-error: false
