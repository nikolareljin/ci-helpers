name: release-tag-check
on:
  create:
    branches:
      - "release/*"
  push:
    branches:
      - "release/*"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check release VERSION matches branch
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/check_release_version.sh --branch "${GITHUB_REF_NAME:-}" --repo "${GITHUB_WORKSPACE:-}"

      - name: Check release tag availability
        uses: ./.github/actions/check-release-tag
        with:
          release_branch: ${{ github.ref_name }}
          repo_dir: ${{ github.workspace }}
          fetch_tags: true
