name: gitleaks-scan
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      scan_path:
        type: string
        default: "."
      report_format:
        type: string
        default: sarif
      output:
        type: string
        default: results.sarif
      config_path:
        type: string
        default: ""
      fail_on_findings:
        type: boolean
        default: false
      upload_artifact:
        type: boolean
        default: false
      artifact_name:
        type: string
        default: gitleaks-report

jobs:
  scan:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Checkout script-helpers
        uses: actions/checkout@v5
        with:
          repository: nikolareljin/script-helpers
          ref: production
          path: .script-helpers
          fetch-depth: 1

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Normalize and evaluate report
        shell: bash
        run: |
          set -euo pipefail
          ./.script-helpers/scripts/ci_gitleaks_report.sh \
            --output "results.sarif" \
            --requested-output "${{ inputs.output }}" \
            --report-format "${{ inputs.report_format }}" \
            --scan-path "${{ inputs.scan_path }}" \
            --config-path "${{ inputs.config_path }}" \
            --fail-on-findings "${{ inputs.fail_on_findings }}"

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.output }}
          if-no-files-found: warn
