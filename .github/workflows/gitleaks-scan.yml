name: gitleaks-scan
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      scan_path:
        description: Path to scan (relative to repo root)
        type: string
        default: "."
      report_format:
        description: "Report format: sarif (default) or json"
        type: string
        default: sarif
      output:
        description: Report output file path
        type: string
        default: results.sarif
      config_path:
        description: Optional path to a .gitleaks.toml config file (relative to repo root)
        type: string
        default: ""
      gitleaks_version:
        description: >
          Gitleaks release tag to download (e.g. "v8.30.1"). Pin this explicitly
          for reproducible scans and supply-chain safety.
        type: string
        default: "v8.30.1"
      fail_on_findings:
        description: Exit non-zero when findings are detected
        type: boolean
        default: false
      upload_artifact:
        description: Upload the report as a workflow artifact
        type: boolean
        default: false
      artifact_name:
        description: Artifact name when uploading the report
        type: string
        default: gitleaks-report

permissions:
  contents: read

# Opt into Node.js 24 early — Node 20 actions deprecated (removed Sep 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 @ 2026-05-23
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Gitleaks scan
        uses: nikolareljin/ci-helpers/.github/actions/gitleaks-scan@production
        with:
          scan_path: ${{ inputs.scan_path }}
          report_format: ${{ inputs.report_format }}
          output: ${{ inputs.output }}
          config_path: ${{ inputs.config_path }}
          gitleaks_version: ${{ inputs.gitleaks_version }}
          fail_on_findings: ${{ inputs.fail_on_findings }}
          upload_artifact: ${{ inputs.upload_artifact }}
          artifact_name: ${{ inputs.artifact_name }}
