name: wp-plugin-check
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      compose_file:
        type: string
        default: test/docker-compose.yml
      plugin_slug:
        type: string
        required: true
      plugin_src:
        type: string
        default: .
      plugin_src_env:
        type: string
        default: PLUGIN_SRC
      wpcli_service:
        type: string
        default: wpcli
      db_service:
        type: string
        default: db
      wordpress_service:
        type: string
        default: wordpress
      host_port:
        type: string
        default: "8080"
      out_dir:
        type: string
        default: test/tmp
      db_wait_seconds:
        type: string
        default: "30"
      multisite:
        type: boolean
        default: true
      activate_network:
        type: boolean
        default: true
      admin_user:
        type: string
        default: admin
      admin_password:
        type: string
        default: admin
      admin_email:
        type: string
        default: admin@example.com
      site_title:
        type: string
        default: WP Test Site
      meta_check_script:
        type: string
        default: ""
      php_version:
        type: string
        default: ""
      php_lint_command:
        type: string
        default: ""
      phpcs_warning_command:
        type: string
        default: ""
      phpunit_command:
        type: string
        default: ""
      phpunit_working_directory:
        type: string
        default: .
      fail_on_findings:
        type: boolean
        default: false
      cleanup:
        type: boolean
        default: true
      upload_artifact:
        type: boolean
        default: false
      artifact_name:
        type: string
        default: plugin-check-results

jobs:
  check:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Checkout script-helpers
        uses: actions/checkout@v5
        with:
          repository: nikolareljin/script-helpers
          ref: 3d70d24b4584997b5ef094b68a3f0d8494b3635c
          path: .script-helpers
          fetch-depth: 1

      - name: WordPress plugin check
        shell: bash
        run: |
          set -euo pipefail
          ./.script-helpers/scripts/ci_wp_plugin_check.sh \
            --compose-file "${{ inputs.compose_file }}" \
            --plugin-slug "${{ inputs.plugin_slug }}" \
            --plugin-src "${{ inputs.plugin_src }}" \
            --plugin-src-env "${{ inputs.plugin_src_env }}" \
            --wpcli-service "${{ inputs.wpcli_service }}" \
            --db-service "${{ inputs.db_service }}" \
            --wordpress-service "${{ inputs.wordpress_service }}" \
            --host-port "${{ inputs.host_port }}" \
            --out-dir "${{ inputs.out_dir }}" \
            --db-wait-seconds "${{ inputs.db_wait_seconds }}" \
            --multisite "${{ inputs.multisite }}" \
            --activate-network "${{ inputs.activate_network }}" \
            --admin-user "${{ inputs.admin_user }}" \
            --admin-password "${{ inputs.admin_password }}" \
            --admin-email "${{ inputs.admin_email }}" \
            --site-title "${{ inputs.site_title }}" \
            --meta-check-script "${{ inputs.meta_check_script }}" \
            --php-version "${{ inputs.php_version }}" \
            --php-lint-command "${{ inputs.php_lint_command }}" \
            --phpcs-warning-command "${{ inputs.phpcs_warning_command }}" \
            --phpunit-command "${{ inputs.phpunit_command }}" \
            --phpunit-working-directory "${{ inputs.phpunit_working_directory }}" \
            --fail-on-findings "${{ inputs.fail_on_findings }}" \
            --cleanup "${{ inputs.cleanup }}"

      - name: Upload artifacts
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.out_dir }}
          if-no-files-found: warn
