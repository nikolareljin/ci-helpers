name: trivy-scan
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      scan_path:
        type: string
        default: "."
      format:
        type: string
        default: sarif
      output:
        type: string
        default: trivy-results.sarif
      severity:
        type: string
        default: CRITICAL,HIGH
      ignore_unfixed:
        type: string
        default: "true"
      vuln_type:
        type: string
        default: os,library
      fail_on_findings:
        type: boolean
        default: false
      upload_sarif:
        type: boolean
        default: true
      upload_artifact:
        type: boolean
        default: false
      artifact_name:
        type: string
        default: trivy-results

permissions:
  contents: read
  security-events: write

# NOTE: Because this workflow is reusable (`workflow_call`), callers still need to
# grant `security-events: write` in the calling workflow when they enable SARIF upload.
jobs:
  scan:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan_path }}
          format: ${{ inputs.format }}
          output: ${{ inputs.output }}
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          vuln-type: ${{ inputs.vuln_type }}
          exit-code: ${{ inputs.fail_on_findings && '1' || '0' }}

      - name: Upload SARIF
        if: ${{ inputs.upload_sarif && inputs.format == 'sarif' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ inputs.output }}

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.output }}
          if-no-files-found: warn
