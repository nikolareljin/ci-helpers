name: go-deploy

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      working_directory:
        type: string
        default: "."
      fetch_depth:
        type: number
        default: 0
      go_version:
        type: string
        default: "1.22"
      bin_name:
        type: string
        required: true
      main_path:
        type: string
        default: "."
      build_target:
        type: string
        default: "linux/amd64"
      ldflags:
        type: string
        default: ""
      remote_path:
        type: string
        required: true
      remote_bin_name:
        type: string
        default: ""
      extra_files:
        type: string
        default: ""
      post_deploy_command:
        type: string
        default: ""
    secrets:
      ssh_host:
        required: true
      ssh_user:
        required: true
      ssh_key:
        required: true

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Build binary
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        env:
          INPUT_BUILD_TARGET: ${{ inputs.build_target }}
          INPUT_BIN_NAME: ${{ inputs.bin_name }}
          INPUT_LDFLAGS: ${{ inputs.ldflags }}
          INPUT_MAIN_PATH: ${{ inputs.main_path }}
        run: |
          set -euo pipefail
          target="${INPUT_BUILD_TARGET}"
          export GOOS="${target%%/*}"
          export GOARCH="${target##*/}"
          export CGO_ENABLED=0

          bin_name="${INPUT_BIN_NAME}"
          if [ "$GOOS" = "windows" ]; then
            bin_name="${bin_name}.exe"
          fi

          if [ -n "${INPUT_LDFLAGS}" ]; then
            go build -o "$bin_name" -ldflags "${INPUT_LDFLAGS}" "${INPUT_MAIN_PATH}"
          else
            go build -o "$bin_name" "${INPUT_MAIN_PATH}"
          fi

          echo "Built ${bin_name} for ${GOOS}/${GOARCH}"
          ls -lh "$bin_name"

      - name: Deploy to remote
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        env:
          DEPLOY_SSH_HOST: ${{ secrets.ssh_host }}
          DEPLOY_SSH_USER: ${{ secrets.ssh_user }}
          DEPLOY_SSH_KEY: ${{ secrets.ssh_key }}
          INPUT_REMOTE_PATH: ${{ inputs.remote_path }}
          INPUT_BIN_NAME: ${{ inputs.bin_name }}
          INPUT_REMOTE_BIN_NAME: ${{ inputs.remote_bin_name }}
          INPUT_EXTRA_FILES: ${{ inputs.extra_files }}
          # post_deploy_command is an intentional arbitrary shell command executed on
          # the remote; callers are trusted to supply safe values.
          INPUT_POST_DEPLOY_COMMAND: ${{ inputs.post_deploy_command }}
        run: |
          set -euo pipefail

          TMP_KEY=$(mktemp)
          trap "rm -f '$TMP_KEY'" EXIT

          # Write SSH key without tracing to avoid leaking it.
          set +x
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$TMP_KEY"
          set -x
          chmod 600 "$TMP_KEY"

          # Use an array so word-splitting on the key path is never a concern.
          SSH_OPTS=(-i "$TMP_KEY" -o StrictHostKeyChecking=no -o BatchMode=yes)
          printf -v SSH_CMD '%q ' ssh "${SSH_OPTS[@]}"
          SSH_CMD="${SSH_CMD% }"
          REMOTE="${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"
          REMOTE_PATH="${INPUT_REMOTE_PATH}"

          bin_name="${INPUT_BIN_NAME}"
          remote_bin="${INPUT_REMOTE_BIN_NAME}"
          if [ -z "$remote_bin" ]; then
            remote_bin="$bin_name"
          fi

          if [[ ! "$REMOTE_PATH" =~ ^[[:alnum:]_./:-]+$ ]]; then
            echo "Invalid remote_path: only alphanumeric, slash, dot, underscore, colon, and dash are allowed." >&2
            exit 2
          fi

          # Ensure remote directory exists.
          ssh "${SSH_OPTS[@]}" "$REMOTE" "mkdir -p -- '$REMOTE_PATH'"

          # Transfer binary.
          rsync -az -e "$SSH_CMD" "$bin_name" "${REMOTE}:${REMOTE_PATH}/${remote_bin}"

          # Transfer extra files (comma-separated list).
          if [ -n "${INPUT_EXTRA_FILES}" ]; then
            IFS=',' read -r -a files <<< "${INPUT_EXTRA_FILES}"
            for f in "${files[@]}"; do
              f="$(echo "$f" | xargs)"
              if [ -f "$f" ]; then
                rsync -az -e "$SSH_CMD" "$f" "${REMOTE}:${REMOTE_PATH}/"
              else
                echo "Warning: extra file '$f' not found, skipping" >&2
              fi
            done
          fi

          # Run post-deploy command on remote (caller-supplied, trusted).
          if [ -n "${INPUT_POST_DEPLOY_COMMAND}" ]; then
            ssh "${SSH_OPTS[@]}" "$REMOTE" "${INPUT_POST_DEPLOY_COMMAND}"
          fi

          echo "Deployed ${bin_name} to ${DEPLOY_SSH_HOST}:${REMOTE_PATH}"
