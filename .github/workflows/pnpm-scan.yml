name: pnpm-scan
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      working_directory:
        type: string
        default: "."
      fetch_depth:
        type: number
        default: 0
      node_version:
        type: string
        default: "22"
      pnpm_version:
        type: string
        default: "latest"
      lint_command:
        type: string
        default: "pnpm run lint"
      test_command:
        type: string
        default: "pnpm run test"
      build_command:
        type: string
        default: "pnpm run build"
      # Space-separated list of workspace filters for per-package audit.
      # Example: "@neobyzantine/map @neobyzantine/calendar"
      # Leave empty to run a single top-level audit instead.
      audit_filters:
        type: string
        default: ""
      audit_level:
        type: string
        default: "high"

# Opt into Node.js 24 early — Node 20 actions deprecated (removed Sep 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Lint
        if: ${{ inputs.lint_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.lint_command }}

      - name: Test
        if: ${{ inputs.test_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.test_command }}

      - name: Build
        if: ${{ inputs.build_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.build_command }}

      - name: Audit (per-package)
        if: ${{ inputs.audit_filters != '' }}
        env:
          AUDIT_FILTERS: ${{ inputs.audit_filters }}
          AUDIT_LEVEL: ${{ inputs.audit_level }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          for filter in $AUDIT_FILTERS; do
            echo "==> auditing $filter"
            pnpm --filter "$filter" audit --audit-level="$AUDIT_LEVEL"
          done

      - name: Audit (workspace-wide)
        if: ${{ inputs.audit_filters == '' }}
        env:
          AUDIT_LEVEL: ${{ inputs.audit_level }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          pnpm audit --audit-level="$AUDIT_LEVEL"
