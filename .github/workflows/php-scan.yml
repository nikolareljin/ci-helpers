name: php-scan
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      working_directory:
        type: string
        default: "."
      fetch_depth:
        type: number
        default: 0
      php_version:
        type: string
        default: "8.2"
      composer_command:
        type: string
        default: "composer install --no-interaction --prefer-dist"
      unit_command:
        type: string
        default: "vendor/bin/phpunit"
      lint_wp_command:
        type: string
        default: "vendor/bin/phpcs --standard=WordPress --extensions=php"
      lint_drupal_command:
        type: string
        default: "vendor/bin/phpcs --standard=Drupal --extensions=php"
      lint_laravel_command:
        type: string
        default: "vendor/bin/pint"
      lint_pimcore_command:
        type: string
        default: "vendor/bin/phpcs --standard=PSR12 --extensions=php src/"
      wp_cli_scan:
        type: boolean
        default: true
      wp_root:
        type: string
        default: "wp-cli-site"
      wp_site_url:
        type: string
        default: "http://localhost:8080"
      wp_site_title:
        type: string
        default: "CI Site"
      wp_admin_user:
        type: string
        default: "admin"
      wp_admin_password:
        type: string
        default: "admin"
      wp_admin_email:
        type: string
        default: "admin@example.com"
      wp_posts_count:
        type: number
        default: 10

jobs:
  scan:
    runs-on: ${{ inputs.runner }}
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          fetch-tags: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}

      - name: Detect WordPress/Drupal project
        id: detect_php_frameworks
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          is_wordpress=false
          is_drupal=false

          if [ -f wp-config.php ] || [ -d wp-content ] || [ -f wp-includes/version.php ]; then
            is_wordpress=true
          fi
          if [ "$is_wordpress" = "false" ] && [ -f composer.json ]; then
            if grep -qiE '"(wordpress/|johnpbloch/wordpress|wp-cli/wp-cli|roots/wordpress|roots/bedrock)"' composer.json; then
              is_wordpress=true
            fi
          fi

          if [ -f core/lib/Drupal.php ] || [ -f web/core/lib/Drupal.php ] || \
             [ -f core/modules/system/system.module ] || [ -f web/core/modules/system/system.module ]; then
            is_drupal=true
          fi
          if [ "$is_drupal" = "false" ] && [ -f composer.json ]; then
            if grep -qiE '"(drupal/core|drupal/core-recommended|drupal/recommended-project)"' composer.json; then
              is_drupal=true
            fi
          fi

          is_pimcore=false
          if [ -f src/*Bundle.php ] || [ -f src/*Bundle.php ] 2>/dev/null; then
            is_pimcore=true
          fi
          if [ "$is_pimcore" = "false" ] && [ -f composer.json ]; then
            if grep -qiE '"(pimcore/pimcore|pimcore/skeleton)"' composer.json; then
              is_pimcore=true
            fi
          fi
          if [ "$is_pimcore" = "false" ] && [ -f composer.json ]; then
            if grep -qiE '"type"[[:space:]]*:[[:space:]]*"pimcore-bundle"' composer.json; then
              is_pimcore=true
            fi
          fi

          echo "is_wordpress=$is_wordpress" >> "$GITHUB_OUTPUT"
          echo "is_drupal=$is_drupal" >> "$GITHUB_OUTPUT"
          echo "is_pimcore=$is_pimcore" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: ${{ inputs.composer_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.composer_command }}

      - name: PHP unit tests
        if: ${{ inputs.unit_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.unit_command }}

      - name: PHP lint (WordPress)
        if: ${{ inputs.lint_wp_command != '' && steps.detect_php_frameworks.outputs.is_wordpress == 'true' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.lint_wp_command }}

      - name: PHP lint (Drupal)
        if: ${{ inputs.lint_drupal_command != '' && steps.detect_php_frameworks.outputs.is_drupal == 'true' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.lint_drupal_command }}

      - name: PHP lint (Laravel)
        if: ${{ inputs.lint_laravel_command != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.lint_laravel_command }}

      - name: PHP lint (Pimcore)
        if: ${{ inputs.lint_pimcore_command != '' && steps.detect_php_frameworks.outputs.is_pimcore == 'true' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          ${{ inputs.lint_pimcore_command }}

      - name: WP-CLI scan
        if: ${{ inputs.wp_cli_scan && steps.detect_php_frameworks.outputs.is_wordpress == 'true' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        env:
          INPUT_WP_ROOT: ${{ inputs.wp_root }}
          INPUT_WP_SITE_URL: ${{ inputs.wp_site_url }}
          INPUT_WP_SITE_TITLE: ${{ inputs.wp_site_title }}
          INPUT_WP_ADMIN_USER: ${{ inputs.wp_admin_user }}
          INPUT_WP_ADMIN_PASSWORD: ${{ inputs.wp_admin_password }}
          INPUT_WP_ADMIN_EMAIL: ${{ inputs.wp_admin_email }}
          INPUT_WP_POSTS_COUNT: ${{ inputs.wp_posts_count }}
        run: |
          set -euo pipefail
          wp_root="${INPUT_WP_ROOT}"

          curl -sSLo wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          php wp-cli.phar --info

          mkdir -p -- "$wp_root"

          for _ in {1..30}; do
            if nc -z 127.0.0.1 3306; then
              break
            fi
            sleep 2
          done

          php wp-cli.phar core download --path="$wp_root" --allow-root
          php wp-cli.phar config create \
            --path="$wp_root" \
            --dbname=wordpress \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1 \
            --dbprefix=wp_ \
            --skip-check \
            --allow-root
          php wp-cli.phar db create --path="$wp_root" --allow-root
          php wp-cli.phar core install \
            --path="$wp_root" \
            --url="${INPUT_WP_SITE_URL}" \
            --title="${INPUT_WP_SITE_TITLE}" \
            --admin_user="${INPUT_WP_ADMIN_USER}" \
            --admin_password="${INPUT_WP_ADMIN_PASSWORD}" \
            --admin_email="${INPUT_WP_ADMIN_EMAIL}" \
            --skip-email \
            --allow-root
          php wp-cli.phar post generate \
            --path="$wp_root" \
            --count="${INPUT_WP_POSTS_COUNT}" \
            --post_type=post \
            --allow-root
          php wp-cli.phar plugin list --path="$wp_root" --format=table --allow-root
