name: docker-multiarch
on:
  workflow_call:
    inputs:
      image_name:
        description: Full image name without tag (e.g. ghcr.io/owner/repo)
        type: string
        required: true
      tag:
        description: Primary version tag to push (e.g. 1.2.3)
        type: string
        required: true
      platforms:
        description: Comma-separated buildx platform list
        type: string
        default: "linux/amd64,linux/arm64"
      dockerfile:
        description: Path to the Dockerfile (relative to context)
        type: string
        default: "Dockerfile"
      context:
        description: Docker build context path
        type: string
        default: "."
      build_args:
        description: Newline-delimited ARG=VALUE pairs passed to docker build
        type: string
        default: ""
      push_latest:
        description: Also push a :latest tag (set false when rebuilding old versions)
        type: boolean
        default: false
      registry:
        description: Container registry host
        type: string
        default: "ghcr.io"
      registry_username:
        description: Registry login username (defaults to github.actor when empty)
        type: string
        default: ""
      scan_after_build:
        description: Run Trivy vulnerability scan on the pushed image
        type: boolean
        default: true
      trivy_severity:
        description: Trivy severity levels to report
        type: string
        default: "CRITICAL,HIGH"
      fail_on_scan_findings:
        description: Fail the job if Trivy finds vulnerabilities
        type: boolean
        default: false
      fetch_depth:
        type: number
        default: 0
    secrets:
      registry_token:
        description: Token for registry login (GITHUB_TOKEN or PAT)
        required: true
    outputs:
      image_digest:
        description: SHA digest of the pushed image
        value: ${{ jobs.build-push.outputs.image_digest }}
      image_ref:
        description: Full image reference (image_name:tag)
        value: ${{ jobs.build-push.outputs.image_ref }}

# Opt into Node.js 24 early — Node 20 actions deprecated (removed Sep 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.tags.outputs.primary }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 @ 2026-05-23
        with:
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0 @ 2026-05-24

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 @ 2026-05-24

      - name: Log in to registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 @ 2026-05-24
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username || github.actor }}
          password: ${{ secrets.registry_token }}

      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ inputs.image_name }}
          TAG: ${{ inputs.tag }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        shell: bash
        run: |
          set -euo pipefail
          primary="${IMAGE}:${TAG}"
          tags="${primary}"
          if [ "${PUSH_LATEST}" = "true" ]; then
            tags="${tags},${IMAGE}:latest"
          fi
          echo "primary=${primary}" >> "${GITHUB_OUTPUT}"
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0 @ 2026-05-24
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (post-push)
        if: ${{ inputs.scan_after_build }}
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e # master @ 2026-06-04
        with:
          image-ref: ${{ steps.tags.outputs.primary }}
          format: table
          severity: ${{ inputs.trivy_severity }}
          ignore-unfixed: "true"
          exit-code: ${{ inputs.fail_on_scan_findings && '1' || '0' }}
