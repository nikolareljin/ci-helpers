name: windows-sign
description: >
  Configure Windows code signing for Tauri builds. Supports three modes:

  tauri_updater (FREE):
    Sets TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD in
    GITHUB_ENV. Signs .sig updater bundles only (ED25519). Does NOT sign the
    MSI/EXE binary — no SmartScreen clearance. Generate a keypair with:
      cargo tauri signer generate -w ~/.tauri/myapp.key

  pfx (PAID — OV or EV certificate from a CA):
    Decodes a base64 PFX, imports it to the current-user cert store, extracts
    the thumbprint, and sets TAURI_WINDOWS_SIGN_COMMAND and
    WINDOWS_CERT_THUMBPRINT in GITHUB_ENV. Tauri reads TAURI_WINDOWS_SIGN_COMMAND
    and invokes signtool to sign the MSI and NSIS EXE with Authenticode.
    PFX/cert cleanup is the CALLER's responsibility — add an if:always() step
    to your build job after cargo tauri build (see docs/actions.md).

  azure (PAID — Azure Trusted Signing):
    Exports Azure Trusted Signing credentials to GITHUB_ENV. After the build,
    the calling workflow must invoke azure/trusted-signing-action to sign the
    MSI/EXE with azuresigntool. This mode does NOT set TAURI_WINDOWS_SIGN_COMMAND
    because Azure signing happens post-build via a separate action step.

inputs:
  sign_mode:
    description: "Signing mode: tauri_updater, pfx, or azure"
    required: true

  # --- tauri_updater inputs ---
  tauri_signing_private_key:
    description: ED25519 private key for Tauri updater signing (base64 or raw)
    required: false
    default: ""
  tauri_signing_private_key_password:
    description: Password for the Tauri updater signing key (leave empty if none)
    required: false
    default: ""

  # --- pfx inputs ---
  certificate_base64:
    description: Base64-encoded PFX certificate file
    required: false
    default: ""
  certificate_password:
    description: Password for the PFX certificate
    required: false
    default: ""
  timestamp_server:
    description: RFC 3161 timestamp server URL
    required: false
    default: "https://timestamp.sectigo.com"

  # --- azure inputs ---
  azure_tenant_id:
    description: Azure AD tenant ID
    required: false
    default: ""
  azure_client_id:
    description: Azure service principal client ID
    required: false
    default: ""
  azure_client_secret:
    description: Azure service principal client secret
    required: false
    default: ""
  azure_endpoint:
    description: Azure Trusted Signing endpoint URL (e.g. https://eus.codesigning.azure.net/)
    required: false
    default: ""
  azure_code_signing_account:
    description: Azure Trusted Signing account name
    required: false
    default: ""
  azure_cert_profile:
    description: Azure Trusted Signing certificate profile name
    required: false
    default: ""

runs:
  using: composite
  steps:
    # ── tauri_updater ─────────────────────────────────────────────────────────
    - name: Configure Tauri updater signing (free ED25519)
      if: ${{ inputs.sign_mode == 'tauri_updater' }}
      shell: pwsh
      env:
        PRIV_KEY: ${{ inputs.tauri_signing_private_key }}
        PRIV_KEY_PW: ${{ inputs.tauri_signing_private_key_password }}
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = "Stop"

        if ([string]::IsNullOrEmpty($env:PRIV_KEY)) {
          Write-Error "tauri_signing_private_key is required for tauri_updater mode."
          exit 1
        }

        # Mask secrets before any output
        Write-Output "::add-mask::$($env:PRIV_KEY)"
        if (-not [string]::IsNullOrEmpty($env:PRIV_KEY_PW)) {
          Write-Output "::add-mask::$($env:PRIV_KEY_PW)"
        }

        # Strip CR/LF before writing to GITHUB_ENV to prevent env-file injection
        # (base64 keys may have wrapped newlines; clipboard paste may add CR)
        $cleanKey = $env:PRIV_KEY -replace '[\r\n]', ''
        $cleanPw  = $env:PRIV_KEY_PW -replace '[\r\n]', ''

        # Export to GITHUB_ENV for subsequent steps
        Add-Content -Path $env:GITHUB_ENV -Value "TAURI_SIGNING_PRIVATE_KEY=$cleanKey"
        Add-Content -Path $env:GITHUB_ENV -Value "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$cleanPw"

    # ── pfx ───────────────────────────────────────────────────────────────────
    - name: Import PFX certificate (paid Authenticode)
      if: ${{ inputs.sign_mode == 'pfx' }}
      shell: pwsh
      env:
        CERT_B64: ${{ inputs.certificate_base64 }}
        CERT_PW: ${{ inputs.certificate_password }}
        TS_URL: ${{ inputs.timestamp_server }}
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = "Stop"

        if ([string]::IsNullOrEmpty($env:CERT_B64)) {
          Write-Error "certificate_base64 is required for pfx mode."
          exit 1
        }

        # Mask secrets
        Write-Output "::add-mask::$($env:CERT_B64)"
        Write-Output "::add-mask::$($env:CERT_PW)"

        # Decode PFX to a temp file with restricted permissions
        $pfxPath = Join-Path $env:TEMP "build-$(New-Guid).pfx"
        [System.Convert]::FromBase64String($env:CERT_B64) | Set-Content $pfxPath -Encoding Byte
        $acl = Get-Acl $pfxPath
        $acl.SetAccessRuleProtection($true, $false)
        $rule = New-Object System.Security.AccessControl.FileSystemAccessRule(
          [System.Security.Principal.WindowsIdentity]::GetCurrent().Name,
          "FullControl", "Allow"
        )
        $acl.SetAccessRule($rule)
        Set-Acl $pfxPath $acl

        # Import into current-user cert store
        $securePw = ConvertTo-SecureString $env:CERT_PW -AsPlainText -Force
        $cert = Import-PfxCertificate -FilePath $pfxPath `
          -CertStoreLocation Cert:\CurrentUser\My `
          -Password $securePw
        $thumb = $cert.Thumbprint
        Write-Output "::add-mask::$thumb"

        # Sanitize timestamp URL: strip CR/LF and require HTTPS to prevent
        # env-file injection and MITM timestamp forgery
        $tsUrl = $env:TS_URL -replace '[\r\n]', ''
        if ($tsUrl -notmatch '^https://') {
          Write-Error "timestamp_server must start with https:// to prevent MITM tampering (got: $tsUrl)"
          exit 1
        }

        # Build TAURI_WINDOWS_SIGN_COMMAND — %1 is the file path placeholder Tauri uses
        $signCmd = "signtool sign /sha1 $thumb /tr $tsUrl /td sha256 /fd sha256 %1"

        # Strip CR/LF from cert values before writing to GITHUB_ENV to prevent
        # env-file injection (base64 PFX data may have wrapped newlines)
        $cleanThumb = $thumb -replace '[\r\n]', ''
        $cleanPfx   = $pfxPath -replace '[\r\n]', ''

        # Persist temp PFX path so cleanup step can remove it
        Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_PFX_PATH=$cleanPfx"
        Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_CERT_THUMBPRINT=$cleanThumb"
        Add-Content -Path $env:GITHUB_ENV -Value "TAURI_WINDOWS_SIGN_COMMAND=$signCmd"

    # PFX/cert cleanup is the CALLER's responsibility.
    # Composite actions have no post-run hook — a cleanup step here would run
    # immediately after import, removing the certificate from the store before
    # the caller's build step can invoke signtool via TAURI_WINDOWS_SIGN_COMMAND.
    #
    # Add this to your build job (after cargo tauri build):
    #
    #   - name: Cleanup Windows certificate
    #     if: always()
    #     shell: pwsh
    #     env:
    #       THUMB: ${{ env.WINDOWS_CERT_THUMBPRINT }}
    #       PFX_PATH: ${{ env.WINDOWS_PFX_PATH }}
    #     run: |
    #       if ($env:THUMB) { Get-ChildItem "Cert:\CurrentUser\My\$($env:THUMB)" -EA SilentlyContinue | Remove-Item -Force }
    #       if ($env:PFX_PATH -and (Test-Path $env:PFX_PATH)) { Remove-Item $env:PFX_PATH -Force }
    #
    # tauri-release.yml already includes this cleanup step.

    # ── azure ─────────────────────────────────────────────────────────────────
    - name: Configure Azure Trusted Signing credentials
      if: ${{ inputs.sign_mode == 'azure' }}
      shell: pwsh
      env:
        AZ_TENANT: ${{ inputs.azure_tenant_id }}
        AZ_CLIENT: ${{ inputs.azure_client_id }}
        AZ_SECRET: ${{ inputs.azure_client_secret }}
        AZ_ENDPOINT: ${{ inputs.azure_endpoint }}
        AZ_ACCOUNT: ${{ inputs.azure_code_signing_account }}
        AZ_PROFILE: ${{ inputs.azure_cert_profile }}
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = "Stop"

        $required = [ordered]@{
          AZ_TENANT   = "azure_tenant_id"
          AZ_CLIENT   = "azure_client_id"
          AZ_SECRET   = "azure_client_secret"
          AZ_ENDPOINT = "azure_endpoint"
          AZ_ACCOUNT  = "azure_code_signing_account"
          AZ_PROFILE  = "azure_cert_profile"
        }
        foreach ($key in $required.Keys) {
          if ([string]::IsNullOrEmpty([System.Environment]::GetEnvironmentVariable($key))) {
            Write-Error "$($required[$key]) is required for azure mode."
            exit 1
          }
        }

        # Mask all secrets
        Write-Output "::add-mask::$($env:AZ_TENANT)"
        Write-Output "::add-mask::$($env:AZ_CLIENT)"
        Write-Output "::add-mask::$($env:AZ_SECRET)"

        # Strip CR/LF from all values before writing to GITHUB_ENV to prevent
        # env-file injection (secrets may have trailing newlines from clipboard paste)
        $cleanTenant   = $env:AZ_TENANT   -replace '[\r\n]', ''
        $cleanClient   = $env:AZ_CLIENT   -replace '[\r\n]', ''
        $cleanSecret   = $env:AZ_SECRET   -replace '[\r\n]', ''
        $cleanEndpoint = $env:AZ_ENDPOINT -replace '[\r\n]', ''
        $cleanAccount  = $env:AZ_ACCOUNT  -replace '[\r\n]', ''
        $cleanProfile  = $env:AZ_PROFILE  -replace '[\r\n]', ''

        # Export to GITHUB_ENV — azure/trusted-signing-action reads these
        Add-Content -Path $env:GITHUB_ENV -Value "AZURE_TENANT_ID=$cleanTenant"
        Add-Content -Path $env:GITHUB_ENV -Value "AZURE_CLIENT_ID=$cleanClient"
        Add-Content -Path $env:GITHUB_ENV -Value "AZURE_CLIENT_SECRET=$cleanSecret"
        Add-Content -Path $env:GITHUB_ENV -Value "AZURE_CODE_SIGNING_ENDPOINT=$cleanEndpoint"
        Add-Content -Path $env:GITHUB_ENV -Value "AZURE_CODE_SIGNING_ACCOUNT=$cleanAccount"
        Add-Content -Path $env:GITHUB_ENV -Value "AZURE_CERT_PROFILE_NAME=$cleanProfile"
