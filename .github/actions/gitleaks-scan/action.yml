name: Gitleaks Scan
description: Run Gitleaks scan and emit a report.
inputs:
  scan_path:
    description: Path to scan (relative to repo root).
    default: "."
    required: false
  report_format:
    description: Report format (sarif only; gitleaks-action output).
    default: sarif
    required: false
  output:
    description: Output report file path.
    default: results.sarif
    required: false
  config_path:
    description: Optional Gitleaks config file path.
    default: ""
    required: false
  fail_on_findings:
    description: Fail when findings are detected.
    default: "false"
    required: false
  upload_artifact:
    description: Upload the report as an artifact.
    default: "false"
    required: false
  artifact_name:
    description: Artifact name when uploading the report.
    default: gitleaks-report
    required: false
runs:
  using: composite
  steps:
    - name: Prepare report path
      shell: bash
      run: |
        set -euo pipefail
        output="${{ inputs.output }}"
        mkdir -p "$(dirname "$output")"
    - name: Install gitleaks binary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        tag=$(gh api repos/gitleaks/gitleaks/releases/latest --jq '.tag_name')
        ver="${tag#v}"
        # Detect OS and arch for the correct release asset
        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        arch=$(uname -m)
        case "${arch}" in x86_64) arch="x64" ;; aarch64|arm64) arch="arm64" ;; esac
        archive="gitleaks_${ver}_${os}_${arch}.tar.gz"
        gh release download "${tag}" \
          --repo gitleaks/gitleaks \
          --pattern "${archive}" \
          --dir /tmp/gl-dl \
          --clobber
        tar -xzf "/tmp/gl-dl/${archive}" -C /tmp gitleaks
        chmod +x /tmp/gitleaks

    - name: Run gitleaks scan
      shell: bash
      env:
        SCAN_PATH: ${{ inputs.scan_path }}
        OUTPUT: ${{ inputs.output }}
        CONFIG_PATH: ${{ inputs.config_path }}
        REPORT_FMT: ${{ inputs.report_format }}
      run: |
        set -euo pipefail
        args=(detect --source "${SCAN_PATH}" --report-format "${REPORT_FMT}" --report-path "${OUTPUT}" --exit-code 0)
        [ -n "${CONFIG_PATH}" ] && args+=(--config "${CONFIG_PATH}")
        /tmp/gitleaks "${args[@]}"
    - name: Evaluate findings
      shell: bash
      run: |
        set -euo pipefail
        report_format="${{ inputs.report_format }}"
        output="${{ inputs.output }}"
        fail_on_findings="${{ inputs.fail_on_findings }}"

        if [[ "$report_format" != "sarif" ]]; then
          report_format="sarif"
        fi
        if [[ ! -f "$output" && -f "results.sarif" ]]; then
          output="results.sarif"
        fi

        REPORT_FORMAT="$report_format" OUTPUT="$output" FAIL_ON_FINDINGS="$fail_on_findings" python3 - <<'PY'
        import json
        import os
        import sys

        report_format = os.environ["REPORT_FORMAT"]
        output = os.environ["OUTPUT"]
        fail_on_findings = os.environ["FAIL_ON_FINDINGS"] == "true"

        count = 0
        if report_format == "sarif":
            with open(output, "r", encoding="utf-8") as fh:
                data = json.load(fh)
            runs = data.get("runs", [])
            for run in runs:
                results = run.get("results", [])
                if isinstance(results, list):
                    count += len(results)
        else:
            with open(output, "r", encoding="utf-8") as fh:
                data = json.load(fh)
            if isinstance(data, list):
                count = len(data)
            elif isinstance(data, dict):
                for key in ("findings", "leaks", "results", "issues"):
                    value = data.get(key)
                    if isinstance(value, list):
                        count += len(value)

        if count > 0:
            print(f"Gitleaks findings detected: {count}")
            print("Tip: remove leaked secrets with Leak-Lock:")
            print("  https://marketplace.visualstudio.com/items?itemName=NikolaReljin.leak-lock")
            print("  https://open-vsx.org/extension/nikolareljin/leak-lock")
            if fail_on_findings:
                sys.exit(3)
        else:
            print("No Gitleaks findings detected.")
        PY
    - name: Upload artifact
      if: ${{ inputs.upload_artifact == 'true' && always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.output }}
        if-no-files-found: warn
